<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="130" y1="380" x2="380" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded-square background for home screen / PWA use -->
  <rect width="512" height="512" rx="112" fill="#0d1117"/>
  <!-- Trail path: lower-left (start) curving up to upper-right (goal) -->
  <path d="M 130,380 C 150,210 360,290 380,130"
        stroke="url(#g)" stroke-width="44" stroke-linecap="round" fill="none"/>
  <!-- Start milestone -->
  <circle cx="130" cy="380" r="30" fill="#863bff"/>
  <circle cx="130" cy="380" r="13" fill="white"/>
  <!-- Intermediate milestones -->
  <circle cx="198" cy="276" r="24" fill="#7167ff"/>
  <circle cx="312" cy="227" r="24" fill="#5c93ff"/>
  <!-- Goal milestone (cyan, larger) -->
  <circle cx="380" cy="130" r="42" fill="#47bfff"/>
  <circle cx="380" cy="130" r="18" fill="white"/>
</svg>
